<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow">
  <title>Revelação Android</title>
  <style>
    :root {
      --bg: #090910;
      --panel: #11131b;
      --line: rgba(255, 255, 255, .18);
      --text: #f6f2ff;
      --muted: rgba(246, 242, 255, .68);
      --accent: #9f65ff;
      --x: 50%;
      --y: 42%;
      --radius: 168px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 12%, rgba(159, 101, 255, .24), transparent 28rem),
        linear-gradient(145deg, #06070b 0%, var(--bg) 58%, #111018 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      width: min(94vw, 640px);
      display: grid;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .title {
      margin: 0;
      font-size: clamp(18px, 4vw, 28px);
      line-height: 1.15;
      letter-spacing: 0;
      font-weight: 800;
    }

    .status {
      min-width: 86px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      background: rgba(255, 255, 255, .06);
    }

    .viewer {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 3;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        radial-gradient(circle at 50% 16%, rgba(255, 255, 255, .11), transparent 22rem),
        linear-gradient(180deg, #181b24 0%, #090a10 100%);
      box-shadow:
        0 24px 72px rgba(0, 0, 0, .58),
        0 0 70px rgba(159, 101, 255, .18);
      isolation: isolate;
      touch-action: none;
      user-select: none;
    }

    .layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      display: block;
    }

    .stage {
      z-index: 0;
      object-fit: cover;
    }

    .human {
      z-index: 1;
      opacity: 0;
      transition: opacity .16s ease;
    }

    .robot {
      z-index: 2;
      filter: drop-shadow(0 22px 32px rgba(0, 0, 0, .38));
      transition: filter .16s ease;
    }

    .viewer.is-revealing .human {
      opacity: 1;
      -webkit-mask-image: radial-gradient(
        circle var(--radius) at var(--x) var(--y),
        #000 0%,
        #000 68%,
        rgba(0, 0, 0, .72) 82%,
        transparent 100%
      );
      mask-image: radial-gradient(
        circle var(--radius) at var(--x) var(--y),
        #000 0%,
        #000 68%,
        rgba(0, 0, 0, .72) 82%,
        transparent 100%
      );
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
    }

    .viewer.is-revealing .robot {
      -webkit-mask-image: radial-gradient(
        circle var(--radius) at var(--x) var(--y),
        transparent 0%,
        transparent 68%,
        rgba(0, 0, 0, .3) 78%,
        #000 100%
      );
      mask-image: radial-gradient(
        circle var(--radius) at var(--x) var(--y),
        transparent 0%,
        transparent 68%,
        rgba(0, 0, 0, .3) 78%,
        #000 100%
      );
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      filter: drop-shadow(0 22px 32px rgba(0, 0, 0, .38)) saturate(1.08);
    }

    .lens {
      position: absolute;
      left: var(--x);
      top: var(--y);
      z-index: 3;
      width: calc(var(--radius) * 2);
      height: calc(var(--radius) * 2);
      border-radius: 999px;
      opacity: 0;
      transform: translate(-50%, -50%) scale(.94);
      pointer-events: none;
      border: 2px solid rgba(255, 255, 255, .76);
      background:
        radial-gradient(circle, rgba(255, 255, 255, .1), transparent 60%),
        conic-gradient(from 100deg, rgba(255, 255, 255, .03), rgba(159, 101, 255, .28), rgba(255, 255, 255, .18), rgba(255, 255, 255, .03));
      box-shadow:
        inset 0 0 24px rgba(255, 255, 255, .18),
        0 0 0 1px rgba(159, 101, 255, .7),
        0 0 32px rgba(159, 101, 255, .72),
        0 0 90px rgba(159, 101, 255, .42);
      transition: opacity .16s ease, transform .16s ease;
    }

    .viewer.is-revealing .lens {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      top: var(--y);
      z-index: 4;
      height: 1px;
      opacity: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .8), rgba(159, 101, 255, .95), transparent);
      box-shadow: 0 0 18px rgba(159, 101, 255, .85);
      pointer-events: none;
      transition: opacity .16s ease;
    }

    .viewer.is-revealing .scan-line {
      opacity: .85;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, .06);
    }

    .controls label {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    @media (max-width: 520px) {
      body {
        padding: 14px;
      }

      .topbar {
        align-items: flex-start;
      }

      .viewer {
        border-radius: 16px;
      }

      .status {
        min-width: 72px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <h1 class="title">Revelação Android</h1>
      <div class="status" id="status">Robô</div>
    </div>

    <section class="viewer" id="viewer" aria-label="Sobreposição entre humano e robô">
      <img
        class="layer stage"
        src="remover-palco.png"
        alt=""
        aria-hidden="true"
      />
      <img
        class="layer human"
        src="remover-humano.png?v=2"
        alt="Humano por baixo da sobreposição"
      />
      <img
        class="layer robot"
        src="remover-robo.png?v=2"
        alt="Robô sobreposto ao humano"
      />
      <div class="lens" aria-hidden="true"></div>
      <div class="scan-line" aria-hidden="true"></div>
    </section>

    <div class="controls">
      <label for="radius">Raio</label>
      <input id="radius" type="range" min="80" max="260" value="168" />
    </div>
  </main>

  <script>
    const viewer = document.getElementById('viewer');
    const radius = document.getElementById('radius');
    const status = document.getElementById('status');

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function setPosition(event) {
      const rect = viewer.getBoundingClientRect();
      const point = event.touches ? event.touches[0] : event;
      const x = ((point.clientX - rect.left) / rect.width) * 100;
      const y = ((point.clientY - rect.top) / rect.height) * 100;

      viewer.style.setProperty('--x', `${clamp(x, 0, 100)}%`);
      viewer.style.setProperty('--y', `${clamp(y, 0, 100)}%`);
    }

    function reveal(event) {
      setPosition(event);
      viewer.classList.add('is-revealing');
      status.textContent = 'Humano';
    }

    function hideReveal() {
      viewer.classList.remove('is-revealing');
      status.textContent = 'Robô';
    }

    viewer.addEventListener('pointerenter', reveal);
    viewer.addEventListener('pointermove', reveal);
    viewer.addEventListener('pointerleave', hideReveal);

    viewer.addEventListener('touchstart', reveal, { passive: true });
    viewer.addEventListener('touchmove', reveal, { passive: true });
    viewer.addEventListener('touchend', hideReveal);
    viewer.addEventListener('touchcancel', hideReveal);

    radius.addEventListener('input', () => {
      viewer.style.setProperty('--radius', `${radius.value}px`);
    });
  </script>
</body>
</html>
